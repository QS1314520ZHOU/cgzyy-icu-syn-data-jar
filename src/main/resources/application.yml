spring:
  application:
    name: cgzyy-icu-syn-data
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

server:
  port: ${SERVER_PORT:10241}

hospitalLog: ${HOSPITAL_NAME:重钢总医院}

# ===================================================================
# 双数据源 MongoDB 配置（不使用 spring.data.mongodb 自动配置）
# ===================================================================
data:
  mongodb:
    smartcare:
      uri: mongodb://dxm:DB%40dmin@10.35.4.11:32121/SmartCare?maxPoolSize=100&waitQueueTimeoutMS=2000&connectTimeoutMS=3000&socketTimeoutMS=5000
    datacenter:
      uri: mongodb://data:Data%40dmin@10.35.4.11:32121/DataCenter?maxPoolSize=100&waitQueueTimeoutMS=2000&connectTimeoutMS=3000&socketTimeoutMS=5000

# ===================================================================
# 原有业务开关（向后兼容）
# ===================================================================
syn:
  run-on-startup: ${SYN_RUN_ON_STARTUP:false}
  bedside-codes: ${SYN_BEDSIDE_CODES:param_亚低温治疗}

# ===================================================================
# bedside 定时同步配置（值前推补写）
# 每天在「时间点前 advance-minutes 分钟」触发对应分组的同步
# ===================================================================
sync:
  advance-minutes: 5                     # 提前量（分钟），如 10:00 同步于 09:55 触发
  timezone: Asia/Shanghai
  edit-user: 6a1f9f01e467916d244bbdaa   # 系统写入账号
  groups:
    - name: temperature-nibp
      description: 体温部位、NIBP部位
      times: ["02:00","06:00","10:00","14:00","18:00","22:00"]
      codes:
        - param_tiWenBuWei
        - param_NIBP部位

    - name: intubation-airway
      description: 插管方式/查管长度/床头抬高/吸痰护理
      times: ["00:00","08:00","16:00"]
      codes:
        - param_插管方式
        - param_chaGuan_len
        - param_chuangtouTaigao
        - param_吸痰护理

    - name: iabp
      description: IABP 主动脉球囊反搏相关
      times: ["09:00","13:00","17:00","21:00"]
      codes:
        - param_是否正确执行冲洗导管与校零
        - param_触发模式
        - param_触发信号
        - param_反博辅助频率
        - param_压力波形是否规则
        - param_球囊导管固定是否有效
        - param_球囊导管内有无回血
        - param_氮气瓶压力是否充足
        - param_穿刺部位
        - param_置入/外露长度
        - param_左上肢是否可扪及桡动脉搏动
        - param_左上肢远端肢体有无紫绀及肿胀
        - param_穿刺侧肢体远端动脉搏动是否可扪及
        - param_穿刺侧肢体远端肢体有无紫绀及肿胀

# ===================================================================
# 源 code 驱动同时间点跨 code 值联动同步
# ===================================================================
source-sync:
  enabled: true
  edit-user: 6a1f9f01e467916d244bbdaa
  timezone: Asia/Shanghai
  lookback-minutes: 180                    # 只处理过去 3 小时内产生/更新的触发记录
  time-tolerance-seconds: 0                 # 源记录 time 与触发 time 的匹配容差（0=精确）
  scan-interval-ms: 300000                  # 定时扫描间隔（5 分钟）
  rules:
    # --- 规则1: IABP 反博压触发联动 ---
    - name: iabp-pressure
      trigger-code: param_反博压
      mappings:
        - target-code: param_iabp心率
          source-codes:
            - param_HR
        - target-code: param_iabp收缩压
          source-codes:
            - param_ibp_s        # 有创优先
            - param_nibp_s
        - target-code: param_iabp舒张压
          source-codes:
            - param_ibp_d
            - param_nibp_d
        - target-code: param_iabp平均压
          source-codes:
            - param_ibp_m
            - param_nibp_m

    # --- 规则2: 心输出量指数触发联动 ---
    - name: ci
      trigger-code: param_CI(心输出量指数)
      mappings:
        - target-code: param_CVP
          source-codes:
            - param_cvp
        - target-code: param_HR
          source-codes:
            - param_HR
        - target-code: param_MAP
          source-codes:
            - param_ibp_m        # 有创优先
            - param_nibp_m

# ===================================================================
# 血糖同步配置（bloodSugar 集合驱动 + 小时分桶取最新 + 整点生成 bedside）
# ===================================================================
bloodsugar-sync:
  enabled: false
  target-code: param_XueTang
  edit-user: 6a1f9f01e467916d244bbdaa
  timezone: Asia/Shanghai
  lookback-hours: 48                      # 只处理近 48 小时内的血糖数据
  scan-interval-ms: 300000                # 定时扫描间隔（5 分钟）

# ===================================================================
# 医嘱驱动 bedside 同步配置（param_biSiLiquid 鼻饲液）
# ===================================================================
order-sync:
  name: bisi-liquid
  target-code: param_biSiLiquid
  order-status: 在执行
  edit-user: 6a1f9f01e467916d244bbdaa
  order-name-keywords:
    - 禁食禁水
    - 禁食
    - 禁水
    - 禁食不禁水
    - 流质
    - 半流质
    - 软食
    - 普食
    - 低盐低脂饮食
    - 糖尿病饮食
    - 其它
